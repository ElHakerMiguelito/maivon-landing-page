<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="pageTitle">Cargando…</title>
  <meta name="description" id="pageDesc" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <link rel="preload" as="image" href="uploads/MAIVON png.png">
  <style>html { background: #F5F5F0; }</style>

  <style>
    /* ── TOKENS — sobreescritos por JS desde CONFIG.colores ── */
    :root {
      --color-verde:      #0CAA58;
      --color-verde-dark: #09844a;
      --color-oscuro:     #1A1A1D;
      --color-fondo:      #F5F5F0;
      --color-fondo-alt:  #EAEAE4;
      --color-gris:       #6B6B6B;
      --color-blanco:     #FAFAF8;
      --color-borde:      rgba(26,26,29,0.09);

      --sombra-card: 0 2px 20px rgba(26,26,29,0.07);

      --fuente-titulo: 'Playfair Display', Georgia, serif;
      --fuente-cuerpo: 'DM Sans', Helvetica Neue, sans-serif;

      --radio: 6px;
      --nav-h: 64px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      font-family: var(--fuente-cuerpo);
      background: var(--color-fondo);
      color: var(--color-oscuro);
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }

    img { display: block; max-width: 100%; }
    a { color: inherit; }

    /* ── NAVBAR ── */
    .nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 900;
      height: var(--nav-h);
      background: rgba(245,245,240,0.96);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid var(--color-borde);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1.5rem;
    }

    .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .nav-logo img { height: 52px; width: auto; }
    .nav-logo-text {
      font-family: var(--fuente-titulo);
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--color-oscuro);
      letter-spacing: -0.02em;
    }
    .nav-logo-text span { color: var(--color-verde); }

    .nav-links {
      display: none;
      list-style: none;
      gap: 2rem;
      align-items: center;
    }
    .nav-links a {
      font-size: 0.85rem;
      font-weight: 500;
      text-decoration: none;
      color: var(--color-oscuro);
      letter-spacing: 0.03em;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--color-verde); }

    .nav-cta { display: none; }

    .hamburger {
      display: flex; flex-direction: column; gap: 5px;
      cursor: pointer; padding: 6px; background: none; border: none;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--color-oscuro); border-radius: 2px;
      transition: all 0.3s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    .mobile-menu {
      display: none;
      position: fixed; top: var(--nav-h); left: 0; right: 0; z-index: 899;
      background: var(--color-blanco);
      border-bottom: 1px solid var(--color-borde);
      padding: 1.5rem;
      flex-direction: column; gap: 0;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      display: block;
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      color: var(--color-oscuro);
      padding: 0.85rem 0;
      border-bottom: 1px solid var(--color-borde);
      transition: color 0.2s;
    }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a:hover { color: var(--color-verde); }

    /* ── BOTONES ── */
    .btn {
      display: inline-flex; align-items: center; gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: var(--radio);
      font-family: var(--fuente-cuerpo);
      font-weight: 600; font-size: 0.9rem;
      letter-spacing: 0.02em;
      text-decoration: none;
      border: 2px solid transparent;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, color 0.2s;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-verde {
      background: var(--color-verde); color: white;
    }
    .btn-verde:hover { background: var(--color-verde-dark); }

    .btn-ghost-white {
      background: transparent;
      border-color: rgba(255,255,255,0.5);
      color: white;
    }
    .btn-ghost-white:hover { background: rgba(255,255,255,0.1); border-color: white; }

    .btn-outline-verde {
      background: transparent;
      border-color: var(--color-verde);
      color: var(--color-verde);
    }
    .btn-outline-verde:hover { background: var(--color-verde); color: white; }

    .btn-blanco {
      background: white; color: var(--color-verde);
    }
    .btn-blanco:hover { background: var(--color-fondo); }

    .btn svg { flex-shrink: 0; }

    /* ── ESTRUCTURA SECCIONES ── */
    section { padding: 5rem 1.5rem; }

    .inner { max-width: 1100px; margin: 0 auto; }

    .sec-label {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--color-verde);
      margin-bottom: 0.6rem;
    }
    .sec-title {
      font-family: var(--fuente-titulo);
      font-size: clamp(1.75rem, 4vw, 2.75rem);
      font-weight: 700; line-height: 1.15;
      letter-spacing: -0.02em;
      margin-bottom: 0.75rem;
    }
    .sec-sub {
      color: var(--color-gris);
      font-size: 1rem; line-height: 1.75;
      max-width: 520px;
      margin-bottom: 3rem;
    }

    /* ── 1. HERO ── */
    #hero {
      background: var(--color-oscuro);
      color: white;
      min-height: 100vh;
      display: flex; align-items: center;
      padding: calc(var(--nav-h) + 3rem) 1.5rem 4rem;
      position: relative; overflow: hidden;
    }
    .hero-glow {
      position: absolute; border-radius: 50%; pointer-events: none;
    }
    .hero-glow-1 {
      width: 500px; height: 500px;
      top: -150px; right: -150px;
      background: radial-gradient(circle, rgba(12,170,88,0.13) 0%, transparent 65%);
    }
    .hero-glow-2 {
      width: 300px; height: 300px;
      bottom: -80px; left: -80px;
      background: radial-gradient(circle, rgba(12,170,88,0.08) 0%, transparent 65%);
    }
    .hero-body { position: relative; z-index: 1; max-width: 720px; }
    .hero-eyebrow {
      font-size: 0.75rem; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--color-verde);
      margin-bottom: 1.5rem;
    }
    .hero-title {
      font-family: var(--fuente-titulo);
      font-size: clamp(3rem, 9vw, 6.5rem);
      font-weight: 700; line-height: 1.02;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
    }
    .hero-title .accent { color: var(--color-verde); }
    .hero-sub {
      font-size: clamp(0.95rem, 2vw, 1.15rem);
      color: rgba(255,255,255,0.65);
      font-weight: 300; line-height: 1.75;
      max-width: 500px;
      margin-bottom: 2.5rem;
    }
    .hero-btns { display: flex; flex-wrap: wrap; gap: 1rem; }

    /* ── 2. SERVICIOS ── */
    #servicios { background: var(--color-fondo); }
    .grid-servicios {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    .card-servicio {
      background: white;
      border: 1px solid var(--color-borde);
      border-radius: var(--radio);
      padding: 2rem;
      display: flex; flex-direction: column; gap: 1rem;
      box-shadow: var(--sombra-card);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card-servicio:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 36px rgba(26,26,29,0.11);
    }
    .card-servicio-nombre {
      font-family: var(--fuente-titulo);
      font-size: 1.25rem; font-weight: 600;
    }
    .card-servicio-desc {
      color: var(--color-gris);
      font-size: 0.9rem; line-height: 1.75; flex-grow: 1;
    }
    .card-servicio-precio {
      font-family: var(--fuente-titulo);
      font-size: 1.5rem; font-weight: 700;
      color: var(--color-verde);
    }

    /* ── 3. POR QUÉ ── */
    #porque { background: var(--color-fondo-alt); }
    .grid-porque {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    .item-porque { display: flex; flex-direction: column; gap: 0.85rem; }
    .icon-porque {
      width: 48px; height: 48px;
      background: var(--color-verde);
      border-radius: var(--radio);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-porque svg {
      width: 22px; height: 22px;
      stroke: white; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .item-porque-titulo {
      font-family: var(--fuente-titulo);
      font-size: 1.1rem; font-weight: 600;
    }
    .item-porque-texto { color: var(--color-gris); font-size: 0.9rem; line-height: 1.75; }

    /* ── 4. GALERÍA ── */
    #galeria { background: var(--color-fondo); }
    .grid-galeria {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.875rem;
    }
    .galeria-cell {
      aspect-ratio: 4/3;
      border-radius: var(--radio);
      overflow: hidden;
      background: var(--color-fondo-alt);
    }
    .galeria-placeholder {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.5rem;
      background: repeating-linear-gradient(
        45deg, transparent, transparent 10px,
        rgba(26,26,29,0.035) 10px, rgba(26,26,29,0.035) 20px
      );
    }
    .galeria-placeholder span {
      font-family: monospace; font-size: 0.7rem;
      color: var(--color-gris); text-align: center;
      padding: 0.5rem;
    }

    /* ── 5. TESTIMONIOS ── */
    #testimonios { background: var(--color-oscuro); color: white; }
    #testimonios .sec-label { color: rgba(255,255,255,0.45); }
    #testimonios .sec-title { color: white; }
    #testimonios .sec-sub { color: rgba(255,255,255,0.55); }
    .grid-testimonios {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }
    .card-testimonio {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: var(--radio);
      padding: 2rem;
      display: flex; flex-direction: column; gap: 1.5rem;
    }
    .stars { color: var(--color-verde); font-size: 0.9rem; letter-spacing: 0.1em; }
    .testimonio-texto {
      font-style: italic;
      color: rgba(255,255,255,0.82);
      font-size: 0.95rem; line-height: 1.8; flex-grow: 1;
    }
    .testimonio-autor { display: flex; align-items: center; gap: 1rem; }
    .testimonio-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--color-verde);
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 0.9rem; color: white;
      flex-shrink: 0;
    }
    .testimonio-nombre { font-weight: 600; font-size: 0.9rem; }
    .testimonio-negocio { font-size: 0.78rem; color: rgba(255,255,255,0.45); margin-top: 0.1rem; }

    /* ── 6. UBICACIÓN ── */
    #ubicacion { background: var(--color-fondo); }
    .grid-ubicacion {
      display: grid;
      grid-template-columns: 1fr;
      gap: 2rem;
    }
    .mapa-wrap {
      border-radius: var(--radio);
      overflow: hidden;
      height: 320px;
      border: 1px solid var(--color-borde);
    }
    .mapa-wrap iframe { width: 100%; height: 100%; border: none; }
    .mapa-placeholder {
      width: 100%; height: 100%;
      background: var(--color-fondo-alt);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 0.75rem;
    }
    .mapa-placeholder svg { width: 36px; height: 36px; stroke: var(--color-verde); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    .mapa-placeholder p { font-size: 0.85rem; color: var(--color-gris); text-align: center; }
    .mapa-link { margin-top: 0.25rem; }
    .info-ubicacion { display: flex; flex-direction: column; gap: 1.5rem; }
    .info-row {
      display: flex; align-items: flex-start; gap: 0.875rem;
    }
    .info-row svg {
      width: 20px; height: 20px; flex-shrink: 0;
      stroke: var(--color-verde); fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
      margin-top: 2px;
    }
    .info-row-titulo { font-weight: 600; font-size: 0.85rem; margin-bottom: 0.25rem; }
    .info-row-texto { font-size: 0.9rem; color: var(--color-gris); line-height: 1.6; }
    .horario-item {
      display: flex; justify-content: space-between;
      padding: 0.6rem 0;
      border-bottom: 1px solid var(--color-borde);
      font-size: 0.875rem;
    }
    .horario-item:last-child { border-bottom: none; }
    .horario-dia { font-weight: 500; }
    .horario-hora { color: var(--color-gris); }

    /* ── 7. CTA FINAL ── */
    #cta-final {
      background: var(--color-verde);
      color: white;
      text-align: center;
    }
    .cta-titulo {
      font-family: var(--fuente-titulo);
      font-size: clamp(1.75rem, 4vw, 3rem);
      font-weight: 700; line-height: 1.15;
      margin-bottom: 1rem;
    }
    .cta-sub {
      font-size: 1rem;
      color: rgba(255,255,255,0.88);
      max-width: 480px; margin: 0 auto 2.5rem;
      line-height: 1.7;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--color-oscuro);
      color: rgba(255,255,255,0.55);
      padding: 3.5rem 1.5rem 2rem;
    }
    .footer-top {
      max-width: 1100px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 2rem;
      padding-bottom: 2rem;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 1.5rem;
    }
    .footer-brand-name {
      font-family: var(--fuente-titulo);
      font-size: 1.4rem; font-weight: 700;
      color: white; letter-spacing: -0.02em;
    }
    .footer-brand-name span { color: var(--color-verde); }
    .footer-brand-tagline { font-size: 0.82rem; margin-top: 0.25rem; color: rgba(255,255,255,0.38); }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .footer-links li a {
      font-size: 0.85rem; text-decoration: none;
      color: rgba(255,255,255,0.55);
      transition: color 0.2s;
    }
    .footer-links li a:hover { color: var(--color-verde); }
    .footer-social { display: flex; flex-direction: column; gap: 0.6rem; }
    .footer-social a {
      display: inline-flex; align-items: center; gap: 0.5rem;
      font-size: 0.85rem; text-decoration: none;
      color: rgba(255,255,255,0.55);
      transition: color 0.2s;
    }
    .footer-social a svg {
      width: 16px; height: 16px;
      stroke: currentColor; fill: none;
      stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
    }
    .footer-social a:hover { color: var(--color-verde); }
    .footer-bottom {
      max-width: 1100px; margin: 0 auto;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.28);
      display: flex; flex-wrap: wrap;
      justify-content: space-between; gap: 0.5rem;
    }

    /* ── ANIMACIONES ── */
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      transition: opacity 0.55s ease, transform 0.55s ease;
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }

    /* ── BREAKPOINTS ── */
    @media (min-width: 768px) {
      .nav-links { display: flex; }
      .nav-cta   { display: block; }
      .hamburger { display: none; }

      .grid-servicios  { grid-template-columns: repeat(3, 1fr); }
      .grid-porque     { grid-template-columns: repeat(2, 1fr); }
      .grid-galeria    { grid-template-columns: repeat(3, 1fr); }
      .grid-testimonios { grid-template-columns: repeat(3, 1fr); }
      .grid-ubicacion  { grid-template-columns: 1fr 1fr; align-items: start; }

      .footer-top {
        flex-direction: row; flex-wrap: wrap; gap: 3rem;
        align-items: flex-start;
      }
      .footer-links { flex-direction: row; gap: 1.5rem; }
      .footer-social { flex-direction: row; gap: 1.25rem; }
    }

    @media (min-width: 1024px) {
      .grid-porque { grid-template-columns: repeat(4, 1fr); }
    }

    /* ── SPLASH / LOADING SCREEN ── */
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #F5F5F0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 2.5rem;
      transition: opacity 0.55s ease, visibility 0.55s ease;
    }
    #splash.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }
    .splash-logo {
      width: 110px; height: 110px;
      object-fit: contain;
      animation: splash-pulse 1.8s ease-in-out infinite;
    }
    @keyframes splash-pulse {
      0%, 100% { opacity: 1;   transform: scale(1);    }
      50%       { opacity: 0.7; transform: scale(0.94); }
    }
    .splash-bar-wrap {
      width: min(260px, 60vw);
      height: 3px;
      background: rgba(26,26,29,0.1);
      border-radius: 99px;
      overflow: hidden;
    }
    .splash-bar {
      height: 100%;
      width: 0%;
      background: var(--color-verde);
      border-radius: 99px;
      transition: width 0.12s linear;
    }
  </style>
</head>
<body>

  <!-- ═══ SPLASH / LOADING SCREEN ═══ -->
  <div id="splash">
    <img class="splash-logo" src="uploads/MAIVON png.png" alt="MAIVON">
    <div class="splash-bar-wrap">
      <div class="splash-bar" id="splashBar"></div>
    </div>
  </div>
  <script>
    /* Arranca inmediatamente — antes de renderizar el resto del body */
    (function() {
      var bar     = document.getElementById('splashBar');
      var splash  = document.getElementById('splash');
      var prog    = 0;
      var tick    = setInterval(function() {
        prog += Math.random() * 18 + 6;
        if (prog >= 100) {
          prog = 100;
          bar.style.width = '100%';
          clearInterval(tick);
          setTimeout(function() { splash.classList.add('hidden'); }, 320);
        } else {
          bar.style.width = prog + '%';
        }
      }, 80);
      /* Fallback: forzar cierre en 3.5s */
      setTimeout(function() {
        clearInterval(tick);
        bar.style.width = '100%';
        setTimeout(function() { splash.classList.add('hidden'); }, 320);
      }, 3500);
    })();
  </script>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="nav" id="nav">
    <a class="nav-logo" href="#hero" id="navLogo" aria-label="Inicio">
      <!-- Logo se inyecta por JS: imagen si CONFIG.logo.horizontal existe, texto si no -->
    </a>
    <ul class="nav-links" id="navLinks" role="list"></ul>
    <a class="btn btn-verde nav-cta" id="navCta" href="#" target="_blank" rel="noopener noreferrer">
      <!-- texto inyectado por JS -->
    </a>
    <button class="hamburger" id="hamburger" aria-label="Menú" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- MENÚ MOBILE -->
  <div class="mobile-menu" id="mobileMenu" role="navigation"></div>

  <!-- ═══ 1. HERO ═══ -->
  <section id="hero">
    <div class="hero-glow hero-glow-1"></div>
    <div class="hero-glow hero-glow-2"></div>
    <div class="hero-body">
      <p class="hero-eyebrow" id="heroEyebrow"></p>
      <h1 class="hero-title" id="heroTitle"></h1>
      <p class="hero-sub"   id="heroSub"></p>
      <div class="hero-btns" id="heroBtns"></div>
    </div>
  </section>

  <!-- ═══ 2. SERVICIOS ═══ -->
  <section id="servicios">
    <div class="inner">
      <p class="sec-label reveal" id="serviciosLabel"></p>
      <h2 class="sec-title reveal" id="serviciosTitulo"></h2>
      <p class="sec-sub reveal"   id="serviciosSubtitulo"></p>
      <div class="grid-servicios" id="gridServicios"></div>
    </div>
  </section>

  <!-- ═══ 3. POR QUÉ NOSOTROS ═══ -->
  <section id="porque">
    <div class="inner">
      <p class="sec-label reveal" id="porqueLabel"></p>
      <h2 class="sec-title reveal" id="porqueTitulo"></h2>
      <p class="sec-sub reveal"   id="porqueSubtitulo"></p>
      <div class="grid-porque" id="gridPorque"></div>
    </div>
  </section>

  <!-- ═══ 4. GALERÍA ═══ -->
  <section id="galeria">
    <div class="inner">
      <p class="sec-label reveal" id="galeriaLabel"></p>
      <h2 class="sec-title reveal" id="galeriaTitulo"></h2>
      <p class="sec-sub reveal"   id="galeriaSubtitulo"></p>

          <div>
            <div class="testimonio-nombre">${t.nombre}</div>
            <div class="testimonio-negocio">${t.negocio}</div>
          </div>
        </div>
      </div>
    `).join('');

    /* ─ UBICACIÓN ─ */
    document.getElementById('ubicacionLabel').textContent = CONFIG.ubicacion.label;
    document.getElementById('ubicacionTitulo').textContent = CONFIG.ubicacion.titulo;

    const mapaWrap = document.getElementById('mapaWrap');
    const mapaQ    = encodeURIComponent(CONFIG.ubicacion.mapaQuery);
    mapaWrap.innerHTML = `
      <iframe
        src="https://maps.google.com/maps?q=${mapaQ}&output=embed"
        title="Mapa de ubicación"
        allowfullscreen
        loading="lazy">
      </iframe>
    `;

    const horarioHTML = CONFIG.ubicacion.horarios.map(h => `
      <div class="horario-item">
        <span class="horario-dia">${h.dia}</span>
        <span class="horario-hora">${h.hora}</span>
      </div>
    `).join('');

    document.getElementById('infoUbicacion').innerHTML = `
      <div class="info-row">
        ${svgIcon('pin')}
        <div>
          <div class="info-row-titulo">Dirección</div>
          <div class="info-row-texto">${CONFIG.ubicacion.direccion}</div>
        </div>
      </div>
      <div class="info-row">
        ${svgIcon('clock')}
        <div style="width:100%">
          <div class="info-row-titulo" style="margin-bottom:0.5rem">Horarios de atención</div>
          ${horarioHTML}
        </div>
      </div>
      <a class="btn btn-outline-verde" 
         href="https://maps.google.com?q=${mapaQ}" 
         target="_blank" rel="noopener noreferrer" 
         style="align-self:flex-start">
        Ver en Google Maps
      </a>
    `;

    /* ─ CTA FINAL ─ */
    document.getElementById('ctaTitulo').textContent   = CONFIG.ctaFinal.titulo;
    document.getElementById('ctaSubtitulo').textContent = CONFIG.ctaFinal.subtitulo;
    const ctaBtn = document.getElementById('ctaBtn');
    ctaBtn.href = contactLink(CONFIG.ctaFinal.mensaje);
    ctaBtn.innerHTML = `${contactIcon(20, true)} ${CONFIG.ctaFinal.btnTexto}`;

    /* ─ FOOTER ─ */
    const nombrePartes = CONFIG.nombre.split('');
    /* Resalta en verde la primera letra del nombre para el footer */
    /* Colorea letras del nombre en el footer según posición */
    const footerLetterColors = { M: 'white', A: 'var(--color-verde)', I: 'var(--color-verde)' };
    document.getElementById('footerNombre').innerHTML =
      CONFIG.nombre.split('').map(function(letra) {
        const color = footerLetterColors[letra] || 'white';
        return `<span style="color:${color}">${letra}</span>`;
      }).join('');
    document.getElementById('footerTagline').textContent = CONFIG.tagline;

    document.getElementById('footerLinks').innerHTML = CONFIG.footer.links.map(l =>
      `<li><a href="${l.href}">${l.etiqueta}</a></li>`
    ).join('');

    document.getElementById('footerSocial').innerHTML = CONFIG.footer.redesSociales.map(r => `
      <a href="${r.url}" target="_blank" rel="noopener noreferrer">
        ${svgIcon(r.icono)}
        ${r.usuario}
      </a>
    `).join('');

    const año = new Date().getFullYear();
    const copy = CONFIG.footer.copyright
      .replace('{año}', año)
      .replace('{nombre}', CONFIG.nombre);
    document.getElementById('footerBottom').innerHTML = `
      <span>${copy}</span>
      <span>${CONFIG.footer.desarrolladoPor}</span>
    `;

    /* ═══════════════════════════════════════════════════════════════
       INTERACTIVIDAD
    ═══════════════════════════════════════════════════════════════ */

    /* ─ Hamburger ─ */
    const hamburger  = document.getElementById('hamburger');
    const mobileMenuEl = document.getElementById('mobileMenu');

    hamburger.addEventListener('click', function() {
      const open = mobileMenuEl.classList.toggle('open');
      hamburger.classList.toggle('open', open);
      hamburger.setAttribute('aria-expanded', open);
    });

    mobileMenuEl.querySelectorAll('a').forEach(function(a) {
      a.addEventListener('click', function() {
        mobileMenuEl.classList.remove('open');
        hamburger.classList.remove('open');
        hamburger.setAttribute('aria-expanded', false);
      });
    });

    /* ─ Scroll: revelar elementos ─ */
    const observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
        }
      });
    }, { threshold: 0.1 });

    document.querySelectorAll('.reveal').forEach(function(el) {
      observer.observe(el);
    });

    /* ─ Scroll: sombra en navbar ─ */
    window.addEventListener('scroll', function() {
      const nav = document.getElementById('nav');
      if (window.scrollY > 20) {
        nav.style.boxShadow = '0 2px 16px rgba(26,26,29,0.1)';
      } else {
        nav.style.boxShadow = 'none';
      }
    }, { passive: true });

  </script>
</body>
</html>
